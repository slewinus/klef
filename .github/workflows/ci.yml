name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: ${{ matrix.os }} / cargo test + clippy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # macOS only: build the Svelte frontend before any cargo command,
      # because tauri::generate_context! validates that frontendDist exists
      # at compile time. Linux skips klef-gui entirely so it doesn't need
      # the frontend build.
      - name: Setup Node (macos)
        if: runner.os == 'macOS'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/klef-gui/package-lock.json

      - name: Build klef-gui frontend (macos)
        if: runner.os == 'macOS'
        working-directory: crates/klef-gui
        run: |
          npm ci
          npm run build

      - name: Test klef-gui frontend (macos)
        if: runner.os == 'macOS'
        working-directory: crates/klef-gui
        run: npm test

      # klef-gui is macOS-only by design (Tauri menu bar app). Skip it on
      # Linux jobs rather than installing the heavy webkit2gtk deps for a
      # crate that won't ship on this platform.
      - name: cargo clippy (linux)
        if: runner.os == 'Linux'
        run: cargo clippy --workspace --exclude klef-gui --all-targets --all-features -- -D warnings

      - name: cargo test (linux)
        if: runner.os == 'Linux'
        run: cargo test --workspace --exclude klef-gui --all-features

      - name: cargo clippy (macos)
        if: runner.os == 'macOS'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test (macos)
        if: runner.os == 'macOS'
        run: cargo test --workspace --all-features
