<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>klef</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        font-size: 13px;
        color: #1d1d1f;
        background: #f5f5f7;
      }
      header {
        padding: 12px 16px;
        background: #fff;
        border-bottom: 1px solid #d2d2d7;
        font-weight: 600;
      }
      main { padding: 8px; }
      .empty { padding: 24px; color: #6e6e73; text-align: center; }
      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        background: #fff;
        border: 1px solid #d2d2d7;
        border-radius: 6px;
        margin-bottom: 6px;
      }
      .name { font-weight: 600; }
      .meta { color: #6e6e73; font-size: 12px; margin-top: 2px; }
      .tag {
        display: inline-block;
        padding: 1px 6px;
        background: #e5e5ea;
        border-radius: 3px;
        margin-right: 4px;
        font-size: 11px;
      }
      button {
        padding: 4px 10px;
        font-size: 12px;
        background: #007aff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover { background: #0051d5; }
      button:disabled { background: #c7c7cc; cursor: default; }
      .toast {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 14px;
        background: #1d1d1f;
        color: white;
        border-radius: 6px;
        font-size: 12px;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .toast.show { opacity: 0.95; }
      .err { color: #ff3b30; padding: 16px; font-size: 12px; }
    </style>
  </head>
  <body>
    <header>klef</header>
    <main id="root">
      <div class="empty">Loading…</div>
    </main>
    <div id="toast" class="toast"></div>
    <script type="module">
      const { invoke } = window.__TAURI__.core;
      const { writeText } = window.__TAURI__.clipboardManager;

      const root = document.getElementById("root");
      const toastEl = document.getElementById("toast");

      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        setTimeout(() => toastEl.classList.remove("show"), 1600);
      }

      function renderRow(key) {
        const row = document.createElement("div");
        row.className = "row";

        const left = document.createElement("div");
        const name = document.createElement("div");
        name.className = "name";
        name.textContent = key.name;
        left.appendChild(name);

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = key.env_var;
        if (key.tags && key.tags.length) {
          meta.appendChild(document.createTextNode(" · "));
          for (const t of key.tags) {
            const tag = document.createElement("span");
            tag.className = "tag";
            tag.textContent = t;
            meta.appendChild(tag);
          }
        }
        left.appendChild(meta);
        row.appendChild(left);

        const btn = document.createElement("button");
        btn.textContent = "Copy";
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          try {
            const value = await invoke("get_key_value", { name: key.name });
            await writeText(value);
            toast(`${key.name} copied`);
          } catch (e) {
            toast(`error: ${e}`);
          } finally {
            btn.disabled = false;
          }
        });
        row.appendChild(btn);
        return row;
      }

      async function load() {
        try {
          const keys = await invoke("list_keys");
          root.innerHTML = "";
          if (!keys.length) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "No keys yet. Add some with the CLI: klef add <name>";
            root.appendChild(empty);
            return;
          }
          for (const k of keys) root.appendChild(renderRow(k));
        } catch (e) {
          root.innerHTML = "";
          const err = document.createElement("div");
          err.className = "err";
          err.textContent = `Failed to load keys: ${e}`;
          root.appendChild(err);
        }
      }

      load();
    </script>
  </body>
</html>
